name: Build OpenChamber Image

on:
  schedule:
    - cron: "0 */6 * * *" # kiểm tra mỗi 6 tiếng
  workflow_dispatch: # cho phép chạy thủ công

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get latest OpenChamber release
        id: release
        run: |
          LATEST=$(curl -s https://api.github.com/repos/openchamber/openchamber/releases/latest | jq -r .tag_name)
          echo "version=$LATEST" >> "$GITHUB_OUTPUT"

          # kiểm tra đã build version này chưa
          CURRENT=""
          if [ -f .current-version ]; then
            CURRENT=$(cat .current-version)
          fi
          if [ "$LATEST" = "$CURRENT" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip if already built
        if: steps.release.outputs.skip == 'true'
        run: echo "Version ${{ steps.release.outputs.version }} already built. Skipping."

      - name: Set up Docker Buildx
        if: steps.release.outputs.skip == 'false'
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: steps.release.outputs.skip == 'false'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        if: steps.release.outputs.skip == 'false'
        uses: docker/build-push-action@v6
        with:
          context: "https://github.com/openchamber/openchamber.git#${{ steps.release.outputs.version }}"
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/openchamber:${{ steps.release.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/openchamber:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save current version
        if: steps.release.outputs.skip == 'false'
        run: |
          echo "${{ steps.release.outputs.version }}" > .current-version
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .current-version
          git commit -m "built openchamber ${{ steps.release.outputs.version }}"
          git push
