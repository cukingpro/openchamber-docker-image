name: Build OpenChamber Image

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Force rebuild even if version exists"
        type: boolean
        default: false

jobs:
  check:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.release.outputs.version }}
      skip: ${{ steps.release.outputs.skip }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Get latest OpenChamber release
        id: release
        run: |
          LATEST=$(curl -s https://api.github.com/repos/openchamber/openchamber/releases/latest | jq -r .tag_name)
          echo "version=$LATEST" >> "$GITHUB_OUTPUT"

          CURRENT=""
          if [ -f .current-version ]; then
            CURRENT=$(cat .current-version)
          fi
          if [ "${{ inputs.force }}" = "true" ] || [ "$LATEST" != "$CURRENT" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check
    if: needs.check.outputs.skip == 'false'
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
            platform: linux/amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Clone and patch source
        run: |
          git clone --depth 1 --branch ${{ needs.check.outputs.version }} https://github.com/openchamber/openchamber.git openchamber-src
          sed -i 's/bun install --frozen-lockfile/bun install/' openchamber-src/Dockerfile

      - name: Build and push (per-platform)
        uses: docker/build-push-action@v6
        with:
          context: ./openchamber-src
          platforms: ${{ matrix.platform }}
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/openchamber:${{ needs.check.outputs.version }}-${{ matrix.runner }}
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,scope=${{ matrix.platform }},mode=max

  merge:
    needs: [check, build]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifest
        run: |
          VERSION=${{ needs.check.outputs.version }}
          IMAGE=ghcr.io/${{ github.repository_owner }}/openchamber

          docker manifest create ${IMAGE}:${VERSION} \
            ${IMAGE}:${VERSION}-ubuntu-24.04 \
            ${IMAGE}:${VERSION}-ubuntu-24.04-arm

          docker manifest create ${IMAGE}:latest \
            ${IMAGE}:${VERSION}-ubuntu-24.04 \
            ${IMAGE}:${VERSION}-ubuntu-24.04-arm

          docker manifest push ${IMAGE}:${VERSION}
          docker manifest push ${IMAGE}:latest

      - name: Save current version
        run: |
          echo "${{ needs.check.outputs.version }}" > .current-version
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .current-version
          git commit -m "built openchamber ${{ needs.check.outputs.version }}"
          git push
